<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Acadêmico Pro</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --error: #ea4335; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        h2, h3 { color: var(--primary); text-align: center; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-voltar { background: #6c757d; width: auto; padding: 8px 15px; margin-bottom: 15px; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .admin-tabs button { background: #e9ecef; color: #495057; }
        .admin-tabs button.active { background: var(--primary); color: white; }
        .lista-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee; }
        .btn-del { background: var(--error); width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .btn-opcao { background: #f8f9fa; color: #212529; text-align: left; border: 1px solid #dee2e6; margin-bottom: 8px; }
        .placar { display: flex; justify-content: space-between; font-weight: bold; background: #e8f0fe; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: var(--primary); }
        .secao-lista { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="card">
        <h2>📚 Sistema de Quiz</h2>
        <button onclick="irPara('tela-senha-prof')">👨‍🏫 Painel do Professor</button>
        <button onclick="irPara('tela-login-aluno')" style="background: var(--secondary);">🎓 Área do Aluno</button>
    </div>

    <div id="tela-senha-prof" class="card hidden">
        <button class="btn-voltar" onclick="irPara('tela-inicio')">← Voltar</button>
        <h3>Acesso Restrito</h3>
        <input type="password" id="inputSenha" placeholder="Senha do Professor">
        <button onclick="verificarSenha()">Entrar</button>
    </div>

    <div id="tela-admin" class="card hidden">
        <button class="btn-voltar" onclick="irPara('tela-inicio')">← Sair</button>
        <div class="admin-tabs">
            <button id="tab-disc" class="active" onclick="mudarAba('disc')">Disciplinas</button>
            <button id="tab-quest" onclick="mudarAba('quest')">Questões</button>
        </div>

        <div id="aba-disc">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="novaDisc" placeholder="Nova Disciplina">
                <button id="addDisc" style="width: 100px; background: var(--secondary);">Add</button>
            </div>
            <div id="lista-disciplinas" style="margin-top: 15px;"></div>
        </div>

        <div id="aba-quest" class="hidden">
            <h3>Adicionar Nova Questão</h3>
            <form id="form-pergunta">
                <select id="selDiscProf" required><option value="">Carregando...</option></select>
                <textarea id="txtQuestao" placeholder="Pergunta..." required></textarea>
                <select id="tipoQ" onchange="toggleCampos(this.value)">
                    <option value="VF">Verdadeiro ou Falso</option>
                    <option value="AE">Múltipla Escolha</option>
                </select>
                <div id="campos-ae" class="hidden">
                    <input type="text" id="oA" placeholder="A"><input type="text" id="oB" placeholder="B">
                    <input type="text" id="oC" placeholder="C"><input type="text" id="oD" placeholder="D">
                    <input type="text" id="oE" placeholder="E">
                </div>
                <label>Resposta Correta:</label>
                <select id="resCorreta"></select>
                <button type="submit" style="background: var(--secondary);">Salvar Questão</button>
            </form>

            <div class="secao-lista">
                <h3>Gerenciar Questões</h3>
                <p style="font-size: 0.8rem; color: #666; text-align: center;">Selecione a disciplina para ver as questões:</p>
                <select id="filtroQuestaoProf" onchange="carregarQuestoesPorDisc(this.value)">
                    <option value="">Escolha uma disciplina...</option>
                </select>
                <div id="lista-questoes" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="tela-login-aluno" class="card hidden">
        <button class="btn-voltar" onclick="irPara('tela-inicio')">← Voltar</button>
        <h2>Entrar no Quiz</h2>
        <input type="text" id="nomeAluno" placeholder="Seu Nome">
        <select id="selDiscAluno"><option value="">Carregando Disciplinas...</option></select>
        <button id="btnPlay" style="background: var(--secondary);">Começar Jogar</button>
    </div>

    <div id="tela-jogo" class="card hidden">
        <div class="placar"><span id="lNome"></span> <span id="lPontos">0</span></div>
        <h3 id="qTexto"></h3>
        <div id="opcoesContainer"></div>
        <button id="btnNext" class="hidden" style="background: var(--secondary);">Próxima</button>
    </div>
