<script type="text/babel">
        function App() {
            const [user, setUser] = React.useState(null);
            const [aba, setAba] = React.useState("agenda");
            const [clientes, setClientes] = React.useState([]);
            const [pacotes, setPacotes] = React.useState([]);
            const [agendamentos, setAgendamentos] = React.useState([]);
            
            // Estados para os formulários
            const [busca, setBusca] = React.useState("");
            const [clienteSelecionado, setClienteSelecionado] = React.useState(null);
            const [fPacote, setFPacote] = React.useState({ nome: "", valor: "" });
            const [fAgenda, setFAgenda] = React.useState({ pacoteId: "", dataHora: "" });

            React.useEffect(() => {
                window.api.onAuthStateChanged(window.auth, (u) => {
                    setUser(u);
                    if (u) {
                        // Busca dados do banco de dados que você configurou (conforme sua imagem do Cloud Firestore)
                        window.api.onSnapshot(window.api.query(window.api.collection(window.db, "clientes"), window.api.where("userId", "==", u.uid)), s => setClientes(s.docs.map(d => ({id:d.id, ...d.data()}))));
                        window.api.onSnapshot(window.api.query(window.api.collection(window.db, "pacotes"), window.api.where("userId", "==", u.uid)), s => setPacotes(s.docs.map(d => ({id:d.id, ...d.data()}))));
                        window.api.onSnapshot(window.api.query(window.api.collection(window.db, "agendamentos"), window.api.where("userId", "==", u.uid)), s => setAgendamentos(s.docs.map(d => ({id:d.id, ...d.data()}))));
                    }
                });
            }, []);

            // Salva um novo pacote de serviço
            const salvarPacote = async () => {
                if(!fPacote.nome || !fPacote.valor) return alert("Preencha o nome e o valor do pacote");
                await window.api.addDoc(window.api.collection(window.db, "pacotes"), { 
                    ...fPacote, 
                    userId: user.uid 
                });
                setFPacote({ nome: "", valor: "" });
                alert("Pacote adicionado com sucesso!");
            };

            return (
                <div>
                    <div className="navbar">AGENDA PRO</div>
                    <div className="container">
                        <div className="tabs">
                            <button className={aba==='agenda'?'active':''} onClick={()=>setAba('agenda')}>Hoje</button>
                            <button className={aba==='novo'?'active':''} onClick={()=>setAba('novo')}>+ Novo</button>
                            <button className={aba==='pacotes'?'active':''} onClick={()=>setAba('pacotes')}>Pacotes</button>
                        </div>

                        {/* ABA DE GERENCIAR PACOTES (A que você pediu) */}
                        {aba === 'pacotes' && (
                            <div className="card">
                                <h3>Adicionar Novo Pacote</h3>
                                <p style={{fontSize: '12px', color: '#666'}}>Cadastre aqui seus serviços (Ex: Maquiagem, Cabelo + Make)</p>
                                
                                <input 
                                    placeholder="Nome do Pacote" 
                                    value={fPacote.nome} 
                                    onChange={e=>setFPacote({...fPacote, nome:e.target.value})}
                                />
                                <input 
                                    placeholder="Valor R$" 
                                    type="number" 
                                    value={fPacote.valor} 
                                    onChange={e=>setFPacote({...fPacote, valor:e.target.value})}
                                />
                                <button onClick={salvarPacote} style={{background: '#34a853'}}>SALVAR PACOTE</button>
                                
                                <hr style={{margin: '20px 0'}}/>
                                
                                <h3>Seus Pacotes Atuais</h3>
                                {pacotes.length === 0 ? <p>Nenhum pacote cadastrado.</p> : 
                                    pacotes.map(p => (
                                        <div key={p.id} className="item-list" style={{display: 'flex', justifyContent: 'space-between', padding: '10px', borderBottom: '1px solid #eee'}}>
                                            <span>{p.nome} - <b>R$ {p.valor}</b></span>
                                            <button 
                                                style={{width: 'auto', padding: '5px 10px', background: '#ea4335', fontSize: '10px'}}
                                                onClick={() => window.api.deleteDoc(window.api.doc(window.db, "pacotes", p.id))}
                                            > Excluir </button>
                                        </div>
                                    ))
                                }
                            </div>
                        )}

                        {/* ... (mantenha o código das abas 'agenda' e 'novo' que já funcionam) ... */}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
