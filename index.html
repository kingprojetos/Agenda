<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Business PRO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        .navbar { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #ddd; }
        .tabs button.active { background: var(--primary); color: white; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [aba, setAba] = React.useState("agenda");
            const [pacotes, setPacotes] = React.useState([]); // Aqui ficam seus pacotes (Maquiagem, Cabelo, etc)
            const [fPacote, setFPacote] = React.useState({ nome: "", valor: "" });

            // Função para adicionar pacote
            const adicionarPacote = () => {
                if(!fPacote.nome || !fPacote.valor) return alert("Preencha o nome e valor!");
                setPacotes([...pacotes, { id: Date.now(), ...fPacote }]);
                setFPacote({ nome: "", valor: "" });
                alert("Pacote salvo com sucesso!");
            };

            return (
                <div>
                    <div className="navbar">AGENDA PRO</div>
                    <div className="container">
                        <div className="tabs">
                            <button className={aba==='agenda'?'active':''} onClick={()=>setAba('agenda')}>Hoje</button>
                            <button className={aba==='novo'?'active':''} onClick={()=>setAba('novo')}>+ Novo</button>
                            <button className={aba==='pacotes'?'active':''} onClick={()=>setAba('pacotes')}>Pacotes</button>
                        </div>

                        {aba === 'pacotes' && (
                            <div className="card">
                                <h3>Gerenciar Pacotes</h3>
                                <input 
                                    placeholder="Nome do Pacote (Ex: Maquiagem)" 
                                    value={fPacote.nome}
                                    onChange={e => setFPacote({...fPacote, nome: e.target.value})}
                                />
                                <input 
                                    placeholder="Valor R$" 
                                    type="number"
                                    value={fPacote.valor}
                                    onChange={e => setFPacote({...fPacote, valor: e.target.value})}
                                />
                                <button className="main-btn" onClick={adicionarPacote}>ADICIONAR PACOTE</button>
                                
                                <div style={{marginTop: '20px'}}>
                                    <h4>Meus Serviços:</h4>
                                    {pacotes.map(p => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'10px', borderBottom:'1px solid #eee'}}>
                                            <span>{p.nome}</span>
                                            <b>R$ {p.valor}</b>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'agenda' && <div className="card"><h3>Seus horários aparecerão aqui.</h3></div>}
                        {aba === 'novo' && <div className="card"><h3>Tela de agendamento.</h3></div>}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
