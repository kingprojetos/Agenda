<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda PRO+ FINAL</title><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>
body { font-family: Arial; background:#f5f7fb; }
.container { max-width:900px; margin:auto; }
.grid { display:grid; grid-template-columns:80px repeat(7,1fr); }
.hour, .cell { border:1px solid #ddd; height:70px; }
.hour { display:flex; align-items:center; justify-content:center; }
.cell { position:relative; }
.event { position:absolute; background:#1a73e8; color:#fff; padding:5px; border-radius:5px; cursor:grab; font-size:12px; }
.modal { position:fixed; top:30%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:20px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.2); }
</style></head>
<body>
<div id="root"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, doc, query, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCFv7bxfdGMg2y7YsVkATK_sqtFhx4g-lg",
authDomain: "agenda-6b09e.firebaseapp.com",
projectId: "agenda-6b09e"
};

const app = initializeApp(firebaseConfig);
window.auth = getAuth(app);
window.db = getFirestore(app);
window.api = { signInWithEmailAndPassword, addDoc, updateDoc, doc, collection, query, onSnapshot, where };
</script><script type="text/babel">
function App(){
const [user,setUser]=React.useState(null);
const [agenda,setAgenda]=React.useState([]);
const [modal,setModal]=React.useState(null);
const [form,setForm]=React.useState({cliente:"",data:""});

React.useEffect(()=>{
window.auth.onAuthStateChanged(u=>{
setUser(u);
if(u){
const q=window.api.query(window.api.collection(window.db,"agendamentos"),window.api.where("userId","==",u.uid));
window.api.onSnapshot(q,snap=>{
setAgenda(snap.docs.map(d=>({id:d.id,...d.data()})));
});
}
});

// PWA service worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
},[]);

const salvar=async()=>{
await window.api.addDoc(window.api.collection(window.db,"agendamentos"),{
...form,userId:user.uid
});
setModal(null);
}

// DRAG
const onDragStart=(e,id)=>{
e.dataTransfer.setData("id",id);
}

const onDrop=async(e,dia,hora)=>{
const id=e.dataTransfer.getData("id");
const novaData=new Date(dia);
novaData.setHours(hora);
await window.api.updateDoc(window.api.doc(window.db,"agendamentos",id),{data:novaData});
}

const horas=[...Array(12)].map((_,i)=>i+8);
const dias=[...Array(7)].map((_,i)=>{
const d=new Date(); d.setDate(d.getDate()+i); return d;
});

return(
<div className="container">
<h2>Agenda PRO+</h2>

<div className="grid">
<div></div>
{dias.map((d,i)=>(<div key={i} className="hour">{d.toLocaleDateString()}</div>))}

{horas.map(h=>(
<>
<div className="hour">{h}:00</div>
{dias.map((d,i)=>{
const eventos=agenda.filter(a=>{
const dt=new Date(a.data);
return dt.getHours()===h && dt.getDate()===d.getDate();
});
return(
<div className="cell"
 onClick={()=>{setModal(true); setForm({data:new Date(d.setHours(h)).toISOString()})}}
 onDragOver={e=>e.preventDefault()}
 onDrop={e=>onDrop(e,d,h)}
 key={i}>

{eventos.map(e=>(
<div draggable
onDragStart={ev=>onDragStart(ev,e.id)}
className="event">
{e.cliente}
</div>
))}

</div>
)
})}
</>
))}
</div>

{modal && (
<div className="modal">
<h3>Novo Agendamento</h3>
<input placeholder="Cliente" onChange={e=>setForm({...form,cliente:e.target.value})}/>
<button onClick={salvar}>Salvar</button>
<button onClick={()=>setModal(null)}>Fechar</button>
</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script><!-- SERVICE WORKER --><script>
const sw = `
self.addEventListener('push', function(event) {
  const data = event.data.json();
  self.registration.showNotification(data.title, {
    body: data.body
  });
});
`;

const blob = new Blob([sw], { type: 'application/javascript' });
const swURL = URL.createObjectURL(blob);
navigator.serviceWorker.register(swURL);
</script></body>
</html>
