<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Acadêmico Pro</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --error: #ea4335; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        h2, h3 { color: var(--primary); text-align: center; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-voltar { background: #6c757d; width: auto; padding: 8px 15px; margin-bottom: 15px; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .admin-tabs button { background: #e9ecef; color: #495057; }
        .admin-tabs button.active { background: var(--primary); color: white; }
        .lista-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee; }
        .btn-del { background: var(--error); width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .btn-opcao { background: #f8f9fa; color: #212529; text-align: left; border: 1px solid #dee2e6; margin-bottom: 8px; }
        .placar { display: flex; justify-content: space-between; font-weight: bold; background: #e8f0fe; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: var(--primary); }
        .secao-lista { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="card">
        <h2>📚 Sistema de Quiz</h2>
        <button id="btnIrSenhaProf">👨‍🏫 Painel do Professor</button>
        <button id="btnIrLoginAluno" style="background: var(--secondary);">🎓 Área do Aluno</button>
    </div>

    <div id="tela-senha-prof" class="card hidden">
        <button class="btn-voltar" id="btnVoltarInicio1">← Voltar</button>
        <h3>Acesso Restrito</h3>
        <input type="password" id="inputSenha" placeholder="Senha do Professor">
        <button id="btnCheckSenha">Entrar</button>
    </div>

    <div id="tela-admin" class="card hidden">
        <button class="btn-voltar" id="btnSairAdmin">← Sair</button>
        <div class="admin-tabs">
            <button id="tab-disc" class="active">Disciplinas</button>
            <button id="tab-quest">Questões</button>
        </div>

        <div id="aba-disc">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="novaDisc" placeholder="Nova Disciplina">
                <button id="addDisc" style="width: 100px; background: var(--secondary);">Add</button>
            </div>
            <div id="lista-disciplinas" style="margin-top: 15px;"></div>
        </div>

        <div id="aba-quest" class="hidden">
            <h3>Adicionar Nova Questão</h3>
            <form id="form-pergunta">
                <select id="selDiscProf" required><option value="">Carregando...</option></select>
                <textarea id="txtQuestao" placeholder="Pergunta..." required></textarea>
                <select id="tipoQ" id="tipoQ">
                    <option value="VF">Verdadeiro ou Falso</option>
                    <option value="AE">Múltipla Escolha</option>
                </select>
                <div id="campos-ae" class="hidden">
                    <input type="text" id="oA" placeholder="A"><input type="text" id="oB" placeholder="B">
                    <input type="text" id="oC" placeholder="C"><input type="text" id="oD" placeholder="D">
                    <input type="text" id="oE" placeholder="E">
                </div>
                <label>Resposta Correta:</label>
                <select id="resCorreta"></select>
                <button type="submit" style="background: var(--secondary);">Salvar Questão</button>
            </form>

            <div class="secao-lista">
                <h3>Gerenciar Questões</h3>
                <select id="filtroQuestaoProf">
                    <option value="">Escolha uma disciplina...</option>
                </select>
                <div id="lista-questoes" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="tela-login-aluno" class="card hidden">
        <button class="btn-voltar" id="btnVoltarInicio2">← Voltar</button>
        <h2>Entrar no Quiz</h2>
        <input type="text" id="nomeAluno" placeholder="Seu Nome">
        <select id="selDiscAluno"><option value="">Carregando Disciplinas...</option></select>
        <button id="btnPlay" style="background: var(--secondary);">Começar Jogar</button>
    </div>

    <div id="tela-jogo" class="card hidden">
        <div class="placar"><span id="lNome"></span> <span id="lPontos">0</span></div>
        <h3 id="qTexto"></h3>
        <div id="opcoesContainer"></div>
        <button id="btnNext" class="hidden" style="background: var(--secondary);">Próxima</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFv7bxfdGMg2y7YsVkATK_sqtFhx4g-lg",
            authDomain: "agenda-6b09e.firebaseapp.com",
            projectId: "agenda-6b09e",
            storageBucket: "agenda-6b09e.firebasestorage.app",
            messagingSenderId: "848846524028",
            appId: "1:848846524028:web:8ba492a2cffcec35edc3f9",
            measurementId: "G-4WE86DXSSZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        const irPara = (id) => {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // Atribuição de eventos (forma mais segura para módulos)
        document.getElementById('btnIrSenhaProf').onclick = () => irPara('tela-senha-prof');
        document.getElementById('btnIrLoginAluno').onclick = () => irPara('tela-login-aluno');
        document.getElementById('btnVoltarInicio1').onclick = () => irPara('tela-inicio');
        document.getElementById('btnVoltarInicio2').onclick = () => irPara('tela-inicio');
        document.getElementById('btnSairAdmin').onclick = () => irPara('tela-inicio');

        document.getElementById('btnCheckSenha').onclick = () => {
            if(document.getElementById('inputSenha').value === "1234567") irPara('tela-admin');
            else alert("Senha Errada!");
            document.getElementById('inputSenha').value = "";
        };

        const mudarAba = (aba) => {
            document.getElementById('aba-disc').classList.toggle('hidden', aba !== 'disc');
            document.getElementById('aba-quest').classList.toggle('hidden', aba !== 'quest');
            document.getElementById('tab-disc').classList.toggle('active', aba === 'disc');
            document.getElementById('tab-quest').classList.toggle('active', aba === 'quest');
        };

        document.getElementById('tab-disc').onclick = () => mudarAba('disc');
        document.getElementById('tab-quest').onclick = () => mudarAba('quest');

        const toggleCampos = (v) => {
            const resC = document.getElementById('resCorreta');
            document.getElementById('campos-ae').classList.toggle('hidden', v === 'VF');
            resC.innerHTML = "";
            const itens = v === 'VF' ? ['Verdadeiro', 'Falso'] : ['A','B','C','D','E'];
            itens.forEach(i => {
                let opt = document.createElement('option');
                opt.value = i; opt.text = i;
                resC.appendChild(opt);
            });
        };
        document.getElementById('tipoQ').onchange = (e) => toggleCampos(e.target.value);
        toggleCampos('VF');

        // --- FIREBASE LOGIC ---
        let dGlobal = [];
        onSnapshot(collection(db, "disciplinas"), (s) => {
            dGlobal = s.docs.map(d => ({id: d.id, ...d.data()}));
            const listaD = document.getElementById('lista-disciplinas');
            listaD.innerHTML = "";
            dGlobal.forEach(d => {
                const div = document.createElement('div');
                div.className = 'lista-item';
                div.innerHTML = `<span>${d.nome}</span>`;
                const btn = document.createElement('button');
                btn.className = 'btn-del'; btn.innerText = 'X';
                btn.onclick = () => delDoc('disciplinas', d.id);
                div.appendChild(btn);
                listaD.appendChild(div);
            });
            
            const options = '<option value="">Selecione...</option>' + dGlobal.map(d => `<option value="${d.id}">${d.nome}</option>`).join('');
            document.getElementById('selDiscProf').innerHTML = options;
            document.getElementById('selDiscAluno').innerHTML = options;
            document.getElementById('filtroQuestaoProf').innerHTML = '<option value="">Escolha uma disciplina...</option>' + dGlobal.map(d => `<option value="${d.id}">${d.nome}</option>`).join('');
        });

        const delDoc = async (col, id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, col, id)); };
        window.delDoc = delDoc; // Expor apenas esta para o clique dinâmico

        document.getElementById('addDisc').onclick = async () => {
            const nome = document.getElementById('novaDisc').value;
            if(nome) await addDoc(collection(db,"disciplinas"), {nome});
            document.getElementById('novaDisc').value = "";
        };

        // GERENCIAR QUESTÕES
        let unsubscribeQuest = null;
        document.getElementById('filtroQuestaoProf').onchange = (e) => {
            const discId = e.target.value;
            const listaContainer = document.getElementById('lista-questoes');
            if(!discId) { listaContainer.innerHTML = ""; return; }
            if(unsubscribeQuest) unsubscribeQuest();

            const q = query(collection(db, "quiz_perguntas"), where("discId", "==", discId));
            unsubscribeQuest = onSnapshot(q, (s) => {
                listaContainer.innerHTML = "";
                if(s.empty) { listaContainer.innerHTML = "<p>Nenhuma questão.</p>"; return; }
                s.docs.forEach(docSnap => {
                    const data = docSnap.data();
                    const div = document.createElement('div');
                    div.className = 'lista-item';
                    div.innerHTML = `<span style="font-size:0.8rem">${data.texto}</span>`;
                    const btn = document.createElement('button');
                    btn.className = 'btn-del'; btn.innerText = 'X';
                    btn.onclick = () => delDoc('quiz_perguntas', docSnap.id);
                    div.appendChild(btn);
                    listaContainer.appendChild(div);
                });
            });
        };

        document.getElementById('form-pergunta').onsubmit = async (e) => {
            e.preventDefault();
            const p = {
                discId: document.getElementById('selDiscProf').value,
                texto: document.getElementById('txtQuestao').value,
                tipo: document.getElementById('tipoQ').value,
                correta: document.getElementById('resCorreta').value,
                data: Date.now()
            };
            if(p.tipo === 'AE') p.opts = { A: document.getElementById('oA').value, B: document.getElementById('oB').value, C: document.getElementById('oC').value, D: document.getElementById('oD').value, E: document.getElementById('oE').value };
            await addDoc(collection(db, "quiz_perguntas"), p);
            e.target.reset(); toggleCampos('VF');
            alert("Questão salva!");
        };

        // --- JOGO ---
        let fila = [], pAtual = null, pts = 0;
        document.getElementById('btnPlay').onclick = async () => {
            const dId = document.getElementById('selDiscAluno').value;
            if(!dId) return alert("Escolha a matéria!");
            pts = 0; document.getElementById('lPontos').innerText = pts;
            document.getElementById('lNome').innerText = document.getElementById('nomeAluno').value;
            const q = query(collection(db, "quiz_perguntas"), where("discId", "==", dId));
            const s = await getDocs(q);
            fila = s.docs.map(d => d.data()).sort(() => Math.random() - 0.5);
            if(!fila.length) return alert("Sem questões!");
            irPara('tela-jogo'); proxima();
        };

        function proxima() {
            if(!fila.length) { document.getElementById('qTexto').innerText = "Fim! Total: " + pts; document.getElementById('opcoesContainer').innerHTML = ""; return; }
            pAtual = fila.shift();
            document.getElementById('qTexto').innerText = pAtual.texto;
            const cont = document.getElementById('opcoesContainer'); cont.innerHTML = "";
            const itens = pAtual.tipo === 'VF' ? ['Verdadeiro', 'Falso'] : ['A','B','C','D','E'];
            itens.forEach(i => {
                const b = document.createElement('button'); b.className = "btn-opcao";
                b.innerText = pAtual.tipo === 'AE' ? `${i}) ${pAtual.opts[i]}` : i;
                b.onclick = () => {
                    document.querySelectorAll('.btn-opcao').forEach(x => x.disabled = true);
                    if(i === pAtual.correta) { b.style.background = "var(--secondary)"; b.style.color="white"; pts += 10; }
                    else { 
                        b.style.background = "var(--error)"; b.style.color="white";
                        fila.splice(Math.floor(Math.random() * fila.length), 0, pAtual);
                    }
                    document.getElementById('lPontos').innerText = pts;
                    document.getElementById('btnNext').classList.remove('hidden');
                };
                cont.appendChild(b);
            });
            document.getElementById('btnNext').classList.add('hidden');
        }
        document.getElementById('btnNext').onclick = proxima;
    </script>
</body>
</html>
