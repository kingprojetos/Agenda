<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Gamificado</title>
    <style>
        :root { --primary: #6200ee; --secondary: #03dac6; --error: #b00020; --success: #4caf50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { color: var(--primary); text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .opcoes-jogo { display: grid; gap: 10px; margin-top: 15px; }
        .btn-opcao { background: #eee; color: #333; text-align: left; }
        .correto { background: var(--success) !important; color: white; }
        .errado { background: var(--error) !important; color: white; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
        .badge { background: var(--secondary); color: black; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="card">
        <h2>O que deseja fazer?</h2>
        <button onclick="mudarTela('tela-admin')">Criar Perguntas (Professor)</button>
        <button onclick="mudarTela('tela-login-aluno')" style="background: var(--secondary); color: black;">Responder (Aluno)</button>
    </div>

    <div id="tela-admin" class="card hidden">
        <button onclick="mudarTela('tela-inicio')" style="background: #666; width: auto; padding: 5px 15px;">← Voltar</button>
        <h2>Painel do Professor</h2>
        <form id="form-pergunta">
            <textarea id="perguntaTexto" placeholder="Digite a pergunta aqui..." required></textarea>
            <select id="tipoPergunta">
                <option value="VF">Verdadeiro ou Falso</option>
                <option value="AE">Múltipla Escolha (A-E)</option>
            </select>
            <div id="campos-ae" class="hidden">
                <input type="text" id="optA" placeholder="Opção A">
                <input type="text" id="optB" placeholder="Opção B">
                <input type="text" id="optC" placeholder="Opção C">
                <input type="text" id="optD" placeholder="Opção D">
                <input type="text" id="optE" placeholder="Opção E">
            </div>
            <label>Resposta Correta:</label>
            <select id="resCorreta"></select>
            <button type="submit">Salvar Pergunta</button>
        </form>
    </div>

    <div id="tela-login-aluno" class="card hidden">
        <h2>Identifique-se</h2>
        <input type="text" id="nomeAluno" placeholder="Seu nome completo">
        <button id="btnEntrarQuiz">Entrar no Jogo</button>
    </div>

    <div id="tela-jogo" class="card hidden">
        <div style="display: flex; justify-content: space-between;">
            <span id="labelNome"></span>
            <span id="labelPontos" class="badge">Pontos: 0</span>
        </div>
        <h3 id="displayPergunta">Carregando...</h3>
        <div id="containerOpcoes" class="opcoes-jogo"></div>
        <button id="btnProxima" class="hidden">Próxima Pergunta</button>
    </div>

    <script type="module">
        import { db, collection, addDoc, onSnapshot, query, orderBy } from './firebase-config.js';

        // --- LÓGICA DE NAVEGAÇÃO ---
        window.mudarTela = (id) => {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // --- LÓGICA ADMIN ---
        const tipoP = document.getElementById('tipoPergunta');
        const resC = document.getElementById('resCorreta');
        const camposAE = document.getElementById('campos-ae');

        const atualizarGabarito = () => {
            resC.innerHTML = "";
            if(tipoP.value === "VF") {
                camposAE.classList.add('hidden');
                ['Verdadeiro', 'Falso'].forEach(v => resC.innerHTML += `<option value="${v}">${v}</option>`);
            } else {
                camposAE.classList.remove('hidden');
                ['A','B','C','D','E'].forEach(v => resC.innerHTML += `<option value="${v}">${v}</option>`);
            }
        };
        tipoP.addEventListener('change', atualizarGabarito);
        atualizarGabarito();

        document.getElementById('form-pergunta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const novaP = {
                texto: document.getElementById('perguntaTexto').value,
                tipo: tipoP.value,
                correta: resC.value,
                data: Date.now()
            };
            if(tipoP.value === "AE") {
                novaP.opcoes = {
                    A: document.getElementById('optA').value, B: document.getElementById('optB').value,
                    C: document.getElementById('optC').value, D: document.getElementById('optD').value,
                    E: document.getElementById('optE').value
                };
            }
            await addDoc(collection(db, "quiz_perguntas"), novaP);
            alert("Pergunta enviada aos alunos!");
            e.target.reset();
        });

        // --- LÓGICA JOGO ---
        let perguntas = [];
        let indexAtual = 0;
        let pontos = 0;
        let nomeUsuario = "";

        document.getElementById('btnEntrarQuiz').addEventListener('click', () => {
            nomeUsuario = document.getElementById('nomeAluno').value;
            if(!nomeUsuario) return alert("Diga seu nome!");
            document.getElementById('labelNome').innerText = nomeUsuario;
            mudarTela('tela-jogo');
            carregarPerguntas();
        });

        function carregarPerguntas() {
            const q = query(collection(db, "quiz_perguntas"), orderBy("data", "asc"));
            onSnapshot(q, (snap) => {
                perguntas = snap.docs.map(d => d.data());
                if(perguntas.length > 0) mostrarPergunta();
            });
        }

        function mostrarPergunta() {
            if(indexAtual >= perguntas.length) {
                document.getElementById('displayPergunta').innerText = `Fim! Você fez ${pontos} pontos.`;
                document.getElementById('containerOpcoes').innerHTML = "";
                return;
            }
            const p = perguntas[indexAtual];
            document.getElementById('displayPergunta').innerText = p.texto;
            const container = document.getElementById('containerOpcoes');
            container.innerHTML = "";
            document.getElementById('btnProxima').classList.add('hidden');

            const lista = p.tipo === "VF" ? ["Verdadeiro", "Falso"] : ["A","B","C","D","E"];
            lista.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-opcao";
                btn.innerText = p.tipo === "AE" ? `${opt}) ${p.opcoes[opt]}` : opt;
                btn.onclick = () => validar(opt, p.correta, btn);
                container.appendChild(btn);
            });
        }

        function validar(escolha, correta, btn) {
            const todos = document.querySelectorAll('.btn-opcao');
            todos.forEach(b => b.disabled = true);
            if(escolha === correta) {
                btn.classList.add('correto');
                pontos += 10;
                document.getElementById('labelPontos').innerText = `Pontos: ${pontos}`;
            } else {
                btn.classList.add('errado');
            }
            document.getElementById('btnProxima').classList.remove('hidden');
        }

        document.getElementById('btnProxima').addEventListener('click', () => {
            indexAtual++;
            mostrarPergunta();
        });

    </script>
</body>
</html>
