<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda PRO+ FINAL</title><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>
body { font-family: Arial; background:#f5f7fb; }
.container { max-width:900px; margin:auto; }
.grid { display:grid; grid-template-columns:80px repeat(7,1fr); }
.hour, .cell { border:1px solid #ddd; height:70px; }
.hour { display:flex; align-items:center; justify-content:center; }
.cell { position:relative; transition:0.2s; }
.cell:hover { background:#eef4ff; }

.event {
  position:absolute;
  background: linear-gradient(135deg, #1a73e8, #6ea8fe);
  color: white;
  padding: 6px;
  border-radius: 8px;
  font-size: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: 0.2s;
  cursor:grab;
}
.event:active { transform: scale(0.95); }

.modal {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translate(-50%,-40%); }
  to { opacity:1; transform:translate(-50%,-50%); }
}

button {
  background: linear-gradient(135deg, #1a73e8, #4dabf7);
  border:none;
  color:white;
  padding:10px;
  border-radius:12px;
  font-weight:bold;
  margin-top:5px;
}
button:active { transform: scale(0.97); }
</style></head>
<body>
<div id="root"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, doc, query, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const firebaseConfig = {
apiKey: "AIzaSyCFv7bxfdGMg2y7YsVkATK_sqtFhx4g-lg",
authDomain: "agenda-6b09e.firebaseapp.com",
projectId: "agenda-6b09e"
};

const app = initializeApp(firebaseConfig);
window.auth = getAuth(app);
window.db = getFirestore(app);
window.api = { signInWithEmailAndPassword, addDoc, updateDoc, doc, collection, query, onSnapshot, where };

// NOTIFICAÇÃO REAL
const messaging = getMessaging(app);
Notification.requestPermission().then(permission => {
  if (permission === "granted") {
    getToken(messaging, {
      vapidKey: "BOfTK-vxWs1SzlgOMeppPtocUyBlET_dPZ837vBYoZfLhLnJ_sMSkNnlI1V0ySfTwYAsEAU4dTbwNmp_akV1wHY"
    }).then(token => {
      console.log("TOKEN:", token);
    });
  }
});
</script><script type="text/babel">
function App(){
const [user,setUser]=React.useState(null);
const [agenda,setAgenda]=React.useState([]);
const [modal,setModal]=React.useState(null);
const [form,setForm]=React.useState({cliente:"",data:""});

React.useEffect(()=>{
window.auth.onAuthStateChanged(u=>{
setUser(u);
if(u){
const q=window.api.query(window.api.collection(window.db,"agendamentos"),window.api.where("userId","==",u.uid));
window.api.onSnapshot(q,snap=>{
setAgenda(snap.docs.map(d=>({id:d.id,...d.data()})));
});
}
});
},[]);

const salvar=async()=>{
await window.api.addDoc(window.api.collection(window.db,"agendamentos"),{
...form,userId:user.uid
});
setModal(null);
}

const onDragStart=(e,id)=>{
e.dataTransfer.setData("id",id);
}

const onDrop=async(e,dia,hora)=>{
const id=e.dataTransfer.getData("id");
const novaData=new Date(dia);
novaData.setHours(hora);
await window.api.updateDoc(window.api.doc(window.db,"agendamentos",id),{data:novaData});
}

const horas=[...Array(12)].map((_,i)=>i+8);
const dias=[...Array(7)].map((_,i)=>{
const d=new Date(); d.setDate(d.getDate()+i); return d;
});

if(!user){
return(
<div className="container">
<h2>Login</h2>
<input placeholder="Email" />
<input type="password" placeholder="Senha" />
<button>Entrar</button>
</div>
)}

return(
<div className="container">
<h2>Agenda PRO+</h2>

<div className="grid">
<div></div>
{dias.map((d,i)=>(<div key={i} className="hour">{d.toLocaleDateString()}</div>))}

{horas.map(h=>(
<>
<div className="hour">{h}:00</div>
{dias.map((d,i)=>{
const eventos=agenda.filter(a=>{
const dt=new Date(a.data);
return dt.getHours()===h && dt.getDate()===d.getDate();
});
return(
<div className="cell"
 onClick={()=>{setModal(true); setForm({data:new Date(d.setHours(h)).toISOString()})}}
 onDragOver={e=>e.preventDefault()}
 onDrop={e=>onDrop(e,d,h)}
 key={i}>

{eventos.map(e=>(
<div draggable
onDragStart={ev=>onDragStart(ev,e.id)}
className="event">
{e.cliente}
</div>
))}

</div>
)
})}
</>
))}
</div>

{modal && (
<div className="modal">
<h3>Novo Agendamento</h3>
<input placeholder="Cliente" onChange={e=>setForm({...form,cliente:e.target.value})}/>
<button onClick={salvar}>Salvar</button>
<button onClick={()=>setModal(null)}>Fechar</button>
</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body>
</html>
